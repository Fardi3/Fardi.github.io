<!DOCTYPE html>
<html>
<head>
  <title>Ultimate Crypto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }
    nav { background:#020617; padding:15px; text-align:center; font-size:20px; }

    .container { padding:20px; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
    }

    .card {
      background:#1e293b;
      padding:15px;
      border-radius:12px;
      text-align:center;
    }

    .up { color:#22c55e; }
    .down { color:#ef4444; }

    button {
      margin:5px;
      padding:8px 12px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .buy { background:green; color:white; }
    .sell { background:red; color:white; }

    #chart {
      margin-top:20px;
    }
  </style>
</head>

<body>

<nav>🚀 Ultimate Crypto Dashboard</nav>

<div class="container">

  <h2>📊 Market</h2>
  <div class="grid" id="market"></div>

  <h2>📈 Chart</h2>
  <div id="chart">
    <iframe 
      src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=30&theme=dark"
      width="100%" height="400">
    </iframe>
  </div>

  <h2>💼 Portfolio</h2>
  <div class="card" id="portfolio"></div>

</div>

<script>
let balance = 1000;
let portfolio = {};
let lastPrices = {};

const coins = [
  {name:"Bitcoin", id:"bitcoin"},
  {name:"Ethereum", id:"ethereum"},
  {name:"Solana", id:"solana"}
];

async function loadPrices(){
  let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd");
  let data = await res.json();

  let market = document.getElementById("market");
  market.innerHTML = "";

  coins.forEach(c => {
    let price = data[c.id].usd;
    let old = lastPrices[c.id];

    let trend="", cls="";
    if(old){
      if(price>old){ trend="▲"; cls="up"; }
      else if(price<old){ trend="▼"; cls="down"; }
    }

    lastPrices[c.id] = price;

    market.innerHTML += `
      <div class="card">
        <h3>${c.name}</h3>
        <p class="${cls}">$${price} ${trend}</p>
        <button class="buy" onclick="buy('${c.name}',${price})">Al</button>
        <button class="sell" onclick="sell('${c.name}',${price})">Sat</button>
      </div>
    `;
  });
}

function buy(name, price){
  if(balance >= price){
    balance -= price;
    if(!portfolio[name]) portfolio[name]=0;
    portfolio[name]++;
  } else {
    alert("Balans azdır");
  }
  updatePortfolio();
}

function sell(name, price){
  if(portfolio[name]){
    portfolio[name]--;
    balance += price;
    if(portfolio[name]<=0) delete portfolio[name];
  }
  updatePortfolio();
}

function updatePortfolio(){
  let html = "Balance: " + balance.toFixed(2) + " USDT<br><br>";
  for(let c in portfolio){
    html += c + ": " + portfolio[c] + "<br>";
  }
  document.getElementById("portfolio").innerHTML = html;
}

loadPrices();
setInterval(loadPrices, 5000);
updatePortfolio();
</script>

</body>
</html>
