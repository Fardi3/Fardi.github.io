<!DOCTYPE html>
<html>
<head>
  <title>Fərdinin Saytı</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      transition: 0.3 s;
    }

    .light-mode {
      background: white;
      color: black;
    }

    nav {
      background: #020617;
      padding: 15 px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 10 px;
      text-decoration: none;
      font-weight: bold;
    }

    header {
      text-align: center;
      padding: 50 px 20 px;
      background: #1e293b;
    }

    section {
      padding: 40 px 20 px;
      text-align: center;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20 px;
    }

    .card {
      background: #1e293b;
      padding: 20 px;
      border-radius: 12 px;
      width: 250 px;
    }

    img {
      width: 100 %;
      border-radius: 10 px;
    }

    button {
      padding: 10 px 15 px;
      margin-top: 10 px;
      border: none;
      border-radius: 8 px;
      cursor: pointer;
      background: #38bdf8;
    }

    Media (max-width: 600 px) {
      .grid {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>

  <!-- MENU -->
  <nav>
    <a href="#home">Ana səhifə</a>
    <a href="#about">Haqqımda</a>
    <a href="#portfolio">Portfolio</a>
    <a href="#contact">Əlaqə</a>
    <button onclick="toggleMode()">🌙</button>
  </nav>

  <!-- HEADER -->
  <header id="home">
    <h1>Fərdinin Saytı 🚀</h1>
    <p>Level 3 Developer 😎</p>
  </header>

  <!-- ABOUT -->
  <section id="about">
    <h2>Haqqımda</h2>
    <p>Mən artıq saytları professional səviyyədə qururam.</p>
  </section>

  <!-- PORTFOLIO -->
  <section id="portfolio">
    <h2>Layihələrim</h2>

    <div class="grid">
      <div class="card">
        <img src="https://picsum.photos/300?1">
        <p>Layihə 1</p>
      </div>

      <div class="card">
        <img src="https://picsum.photos/300?2">
        <p>Layihə 2</p>
      </div>

      <div class="card">
        <img src="https://picsum.photos/300?3">
        <p>Layihə 3</p>
      </div>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>Əlaqə</h2>
    <p>Email: example@gmail.com</p>
  </section>

  <script>
    Function toggleMode() {
      document.body.classList.toggle("light-mode");
    }
  </script>

</body>
</html>
