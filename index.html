<!DOCTYPE html>
<html>
<head>
  <title>Restoran Saytı</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    nav {
      background: black;
      padding: 15 px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 10 px;
      text-decoration: none;
      font-weight: bold;
    }

    header {
      background: url('https://picsum.photos/1200/500') center/cover;
      padding: 100 px 20 px;
      text-align: center;
    }

    header h1 {
      font-size: 40 px;
      color: gold;
    }

    section {
      padding: 40 px 20 px;
      text-align: center;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20 px;
    }

    .card {
      background: #222;
      padding: 15 px;
      border-radius: 10 px;
      width: 250 px;
    }

    img {
      width: 100 %;
      border-radius: 10 px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 12 px 20 px;
      border-radius: 8 px;
      cursor: pointer;
      margin-top: 15 px;
    }

    footer {
      background: black;
      padding: 20 px;
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- MENU -->
  <nav>
    <a href="#home">Ana səhifə</a>

        <img src="https://picsum.photos/300?food1">

      <div class="card">
        <img src="https://picsum.photos/300?food2">
        <h3>Pitsa</h3>
        <p>12 AZN</p>
      </div>

      <div class="card">
        <img src="https://picsum.photos/300?food3">

    <p>Biz müştərilərimizə ən keyfiyyətli və dadlı yeməkləri təqdim edirik.</p>
  </section>

  <section id="contact">
    <h2>Əlaqə</h2>
    <p>📍 Bakı</p>
    <p>📞 +994 50 000 00 00</p>

    <button onclick="orderNow()">WhatsApp ilə sifariş et</button>

  <footer>
    <p>© 2026 Restoran</p>
  </footer>

  <script>
    Function orderNow() {
      window.open("https://wa.me/994500000000", "_blank");
    }
  </script>

</html>
