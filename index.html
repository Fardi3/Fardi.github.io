<!DOCTYPE html>
<html>
<head>
  <title>Crypto Pro Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }
    nav { background:#020617; padding:15px; text-align:center; font-size:20px; }

    .container { padding:20px; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:15px;
    }

    .card {
      background:#1e293b;
      padding:15px;
      border-radius:12px;
      text-align:center;
      transition:0.3s;
    }

    .up { color:#22c55e; }
    .down { color:#ef4444; }

    button {
      margin-top:10px;
      padding:8px 12px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .buy { background:green; color:white; }
    .sell { background:red; color:white; }

  </style>
</head>

<body>

<nav>💰 Crypto PRO</nav>

<div class="container">

  <h2>📊 Market</h2>
  <div class="grid" id="market"></div>

  <h2>💼 Wallet</h2>
  <div class="card">
    Balance: <span id="balance">1000</span> USDT
  </div>

</div>

<script>
let balance = 1000;
let lastPrices = {};

const coins = [
  {name:"Bitcoin", id:"bitcoin"},
  {name:"Ethereum", id:"ethereum"},
  {name:"Solana", id:"solana"}
];

async function loadPrices(){
  let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd");
  let data = await res.json();

  let market = document.getElementById("market");
  market.innerHTML = "";

  coins.forEach(c => {
    let price = data[c.id].usd;
    let old = lastPrices[c.id];

    let trend = "";
    let className = "";

    if(old){
      if(price > old){
        trend = "▲";
        className = "up";
      } else if(price < old){
        trend = "▼";
        className = "down";
      }
    }

    lastPrices[c.id] = price;

    market.innerHTML += `
      <div class="card">
        <h3>${c.name}</h3>
        <p class="${className}">$${price} ${trend}</p>
        <button class="buy" onclick="buy('${c.name}', ${price})">Al</button>
        <button class="sell" onclick="sell('${c.name}', ${price})">Sat</button>
      </div>
    `;
  });
}

function buy(name, price){
  if(balance >= price){
    balance -= price;
    alert(name + " alındı");
  } else {
    alert("Balans azdır");
  }
  updateBalance();
}

function sell(name, price){
  balance += price;
  alert(name + " satıldı");
  updateBalance();
}

function updateBalance(){
  document.getElementById("balance").innerText = balance.toFixed(2);
}

loadPrices();
setInterval(loadPrices, 5000);
</script>

</body>
</html>
