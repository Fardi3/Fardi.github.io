<!DOCTYPE html>
<html>
<head>
  <title>Fərdinin Saytı</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    /* NAVBAR */
    nav {
      background: #020617;
      padding: 15 px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15 px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #38bdf8;
    }

    header {
      text-align: center;
      padding: 60 px 20 px;
      background: #1e293b;
    }

    h1 {
      color: #38bdf8;
    }

    section {
      padding: 50 px 20 px;
      text-align: center;
    }

    .box {
      background: #1e293b;
      margin: 20 px auto;
      padding: 20 px;
      max-width: 400 px;
      border-radius: 12 px;
    }

    button {
      padding: 10 px 20 px;
      background: #38bdf8;
      border: none;
      border-radius: 8 px;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

  <!-- MENU -->
  <nav>
    <a href="#home">Ana səhifə</a>
    <a href="#about">Haqqımda</a>
    <a href="#contact">Əlaqə</a>
  </nav>

  <!-- HEADER -->
  <header id="home">
    <h1>Fərdinin Saytı 🚀</h1>
    <p>Artıq Level 2-dəyəm 😎</p>
  </header>

  <!-- ABOUT -->
  <section id="about">
    <h2>Haqqımda</h2>

    <div class="box">
      <p>Mən web development öyrənirəm və öz saytımı qururam.</p>
      <button onclick="showMessage()">Klik et</button>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>Əlaqə</h2>

    <div class="box">
      <p>Email: example@gmail.com</p>
      <p>Instagram: @ferdi</p>
    </div>
  </section>

  <script>
    Function showMessage() {
      alert("Level 2 tamamlandı 🔥");
    }
  </script>

</body>
</html>
