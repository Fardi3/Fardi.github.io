<!DOCTYPE html>
<html>
<head>
  <title>Premium Restoran</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    nav {
      background: black;
      padding: 15 px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 10 px;
      text-decoration: none;
      font-weight: bold;
    }

    header {
      background: url('https://picsum.photos/1200/500?food') center/cover;
      padding: 120 px 20 px;
      text-align: center;
    }

    header h1 {
      font-size: 45 px;
      color: gold;
    }

    section {
      padding: 50 px 20 px;
      text-align: center;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20 px;
    }

    .card {
      background: #1e293b;
      padding: 15 px;
      border-radius: 12 px;
      width: 250 px;
    }

    img {
      width: 100 %;
      border-radius: 10 px;
    }

    .review {
      background: #1e293b;
      margin: 15 px auto;
      padding: 15 px;
      max-width: 400 px;
      border-radius: 10 px;
    }

    button {
      background: green;
      color: white;
      padding: 12 px 20 px;
      border: none;
      border-radius: 8 px;
      cursor: pointer;
    }

    iframe {
      width: 100 %;
      height: 300 px;
      border: none;
      margin-top: 20 px;
    }
  </style>
</head>

<body>

<nav>
  <a href="#home">Ana səhifə</a>
  <a href="#menu">Menyu</a>
  <a href="#reviews">Rəylər</a>
  <a href="#contact">Əlaqə</a>
</nav>

<header id="home">
  <h1>Premium Restoran 🍔</h1>
  <p>Dadın zirvəsi</p>
</header>

<section id="menu">
  <h2>Menyu</h2>

  <h3>Burgerlər</h3>
  <div class="menu">
    <div class="card">
      <img src="https://picsum.photos/300?burger">
      <p>Classic Burger - 10 AZN</p>
      <button onclick="order('Burger')">Sifariş et</button>
    </div>
  </div>

  <h3>Pitsalar</h3>
  <div class="menu">
    <div class="card">
      <img src="https://picsum.photos/300?pizza">
      <p>Pepperoni - 12 AZN</p>
      <button onclick="order('Pizza')">Sifariş et</button>
    </div>
  </div>

</section>

<section id="reviews">
  <h2>Müştəri rəyləri</h2>

  <div class="review">⭐️⭐️⭐️⭐️⭐️ Çox dadlı idi!</div>
  <div class="review">⭐️⭐️⭐️⭐️ Super xidmət</div>
</section>

<section id="contact">
  <h2>Əlaqə</h2>
  <p>📞 +994 50 000 00 00</p>

  <button onclick="order('Salam, sifariş vermək istəyirəm')">
    WhatsApp ilə sifariş
  </button>

  <!-- GOOGLE MAP -->
  <iframe src="https://maps.google.com/maps?q=baku&output=embed"></iframe>
</section>

<script>
Function order(item) {
  Let msg = "Salam, " + item + " sifariş etmək istəyirəm";
  window.open("https://wa.me/994500000000?text=" + encodeURIComponent(msg));
}
</script>

</body>
</html>
