<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restoran Menyu</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    nav {
      background: black;
      padding: 15 px;
      text-align: center;
    }

    input {
      padding: 10 px;
      width: 80 %;
      margin: 10 px;
      border-radius: 6 px;
      border: none;
    }

    .filters button {
      margin: 5 px;
      padding: 8 px 12 px;
      cursor: pointer;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15 px;
      padding-bottom: 90 px;
    }

    .card {
      background: #1e293b;
      padding: 15 px;
      width: 200 px;
      border-radius: 10 px;
      text-align: center;
    }

    button {
      padding: 8 px 12 px;
      margin-top: 10 px;
      cursor: pointer;
      border: none;
      border-radius: 6 px;
    }

    #cart {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100 %;
      background: black;
      padding: 10 px;
      text-align: center;
    }
  </style>
</head>

<body>

  <nav>
    <h2>🍔 Menyu</h2>
  </nav>

  <input type="text" id="search" placeholder="Axtar..." onkeyup="renderMenu()" />

  <div class="filters">
    <button onclick="setCategory('all')">Hamısı</button>
    <button onclick="setCategory('burger')">Burger</button>
    <button onclick="setCategory('pizza')">Pizza</button>
  </div>

  <div class="menu" id="menu"></div>

  <div id="cart">
    🛒 Səbət: <span id="cartItems">0</span> |
    💰 Total: <span id="total">0</span> AZN
    <button onclick="sendOrder()">Sifariş et</button>
  </div>

  <script>
    Let foods = [
      { name: "Burger", price: 10, category: "burger" },
      { name: "Cheese Burger", price: 12, category: "burger" },
      { name: "Pizza", price: 15, category: "pizza" },
      { name: "Pepperoni", price: 18, category: "pizza" }
    ];

    Let cart = [];
    Let category = "all";

    Function setCategory(cat) {
      category = cat;
      renderMenu();
    }

    Function renderMenu() {
      Let search = document.getElementById("search").value.toLowerCase();
      Let menu = document.getElementById("menu");
      menu.innerHTML = "";

      foods
        .filter(f. =>
          (category === "all" || f.category === category) &&
          f.name.toLowerCase().includes(search)
        )
        .forEach(f. => {
          menu.innerHTML += `
            <div class="card">
              <h3>${f.name}</h3>
              <p>${f.price} AZN</p>
              <button onclick="addToCart('${f.name}', ${f.price})">Əlavə et</button>
            </div>
          `;
        });
    }

    Function addToCart(name, price) {
      cart.push({ name, price });
      updateCart();
    }

    Function updateCart() {
      document.getElementById("cartItems").innerText = cart.length;
      Let total = cart.reduce((sum., i) => sum + i.price, 0);
      document.getElementById("total").innerText = total;
    }

    Function sendOrder() {
      If (cart.length === 0) {
        alert("Səbət boşdur!");
        Return;
      }

      Let text = "Salam, sifariş:\n";
      cart.forEach(i.=> text += "- " + i.name + "\n");
      Let total = cart.reduce((s., i) => s + i.price, 0);
      text += "Total: " + total + " AZN";

      window.open("https://wa.me/994500000000?text=" + encodeURIComponent(text), "_blank");
    }

    renderMenu();
  </script>

</body>
</html>
